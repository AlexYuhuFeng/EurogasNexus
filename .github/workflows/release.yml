name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_channel:
        description: Release channel label.
        type: choice
        required: true
        default: preview
        options:
          - preview
          - rc
          - stable
      prerelease:
        description: Mark the GitHub Release as a prerelease.
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  packages: write

concurrency:
  group: eurogas-nexus-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q tests/api tests/contract tests/integration tests/ingestion tests/unit tests/optimization tests/sdk tests/cli tests/release tests/security

      - name: Import API
        run: python -c "from apps.api.main import app; print('app import ok'); print(len(app.routes))"

  web:
    name: Build Web client
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Web dependencies
        working-directory: clients/web
        run: npm ci

      - name: Build Web client
        working-directory: clients/web
        run: npm run build

      - name: Package Web client
        shell: bash
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/eurogas-nexus-web-${GITHUB_SHA::7}.tar.gz" -C clients/web/dist .

      - name: Upload Web release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-web
          path: release-assets/*
          if-no-files-found: error

  desktop:
    name: Build desktop client (${{ matrix.artifact_label }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: nsis
            artifact_label: windows-x64
            artifact_glob: clients/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            bundle: deb
            artifact_label: linux-x64
            artifact_glob: clients/desktop/src-tauri/target/release/bundle/deb/*.deb
          - os: ubuntu-24.04-arm
            bundle: deb
            artifact_label: linux-arm64
            artifact_glob: clients/desktop/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: bash scripts/ci/install_linux_tauri_dependencies.sh

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install Web dependencies
        working-directory: clients/web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: clients/desktop
        run: npm ci

      - name: Build desktop bundle
        working-directory: clients/desktop
        run: npm run build -- --bundles ${{ matrix.bundle }}

      - name: Collect Windows Client-only asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $source = Get-ChildItem "clients/desktop/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $source) { throw "The Windows Client NSIS installer was not produced." }
          Copy-Item $source.FullName "release-assets/Eurogas-Nexus-Client-0.5.0-x64-setup.exe"

      - name: Collect Linux desktop asset
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets
          cp ${{ matrix.artifact_glob }} release-assets/

      - name: Upload desktop release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-desktop-${{ matrix.artifact_label }}
          path: release-assets/*
          if-no-files-found: error

  runtime-image:
    name: Build and publish runtime image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/eurogasnexus-api" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/runtime/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:0.5-preview
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}

      - name: Build Windows AllInOne API image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/runtime/Dockerfile.api
          platforms: linux/amd64
          tags: eurogas-nexus-api:sha-${{ github.sha }}
          outputs: type=docker,dest=${{ runner.temp }}/eurogas-nexus-api-amd64.tar

      - name: Upload Windows AllInOne API image archive
        uses: actions/upload-artifact@v7
        with:
          name: all-in-one-runtime-image-amd64
          path: ${{ runner.temp }}/eurogas-nexus-api-amd64.tar
          if-no-files-found: error

  deployment:
    name: Package deployment roles
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Package dedicated Server operator tooling
        shell: bash
        run: bash scripts/release/package_deployment_bundle.sh release-assets

      - name: Upload deployment release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-deployment
          path: release-assets/*
          if-no-files-found: error

  all-in-one-windows:
    name: Build Windows AllInOne installer
    runs-on: windows-latest
    needs:
      - desktop
      - runtime-image

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download Windows Client-only installer
        uses: actions/download-artifact@v8
        with:
          name: release-desktop-windows-x64
          path: staging/client

      - name: Download API image archive
        uses: actions/download-artifact@v8
        with:
          name: all-in-one-runtime-image-amd64
          path: staging/runtime

      - name: Install NSIS build tooling
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Build self-contained AllInOne NSIS installer
        shell: pwsh
        run: |
          $client = (Get-ChildItem staging/client -Filter *.exe -Recurse | Select-Object -First 1).FullName
          $image = (Get-ChildItem staging/runtime -Filter *.tar -Recurse | Select-Object -First 1).FullName
          if (-not $client -or -not $image) { throw "AllInOne input artifacts are incomplete." }
          ./scripts/release/build_all_in_one_installer.ps1 `
            -ClientInstallerPath $client `
            -ApiImageArchivePath $image `
            -ApiImage "eurogas-nexus-api:sha-${{ github.sha }}" `
            -OutputDirectory release-assets

      - name: Upload AllInOne release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-all-in-one-windows
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - web
      - desktop
      - runtime-image
      - deployment
      - all-in-one-windows
    if: ${{ always() && needs.web.result == 'success' && needs.runtime-image.result == 'success' && needs.deployment.result == 'success' && needs.all-in-one-windows.result == 'success' && needs.desktop.result == 'success' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create release metadata
        id: metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          CHANNEL="${{ github.event.inputs.release_channel || 'preview' }}"
          DESKTOP_INCLUDED="true"
          TAG="v0.5-${CHANNEL}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          {
            echo "# Eurogas Nexus v0.5 preview (${TAG})"
            echo
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Channel: ${CHANNEL}"
            if [[ "${DESKTOP_INCLUDED}" == "true" ]]; then
              echo "- Includes: Web build, Windows x64 Client-only NSIS installer, Windows x64 AllInOne NSIS installer, Linux x64 DEB package, Linux ARM64 DEB package, deployment role bundle, and multi-architecture API image."
            else
              echo "- Includes: Web build, deployment role bundle, and multi-architecture API image. Desktop packaging was not requested for this run."
            fi
            echo "- Runtime image: ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/eurogasnexus-api:sha-${GITHUB_SHA}"
            echo
            echo "## Windows assets"
            echo
            echo "- New evaluation workstation with Docker only: download **Eurogas-Nexus-AllInOne-...-x64-setup.exe**. It installs the desktop frontend and provisions the loopback-only API and PostgreSQL runtime automatically."
            echo "- Workstation connecting to an existing server: download **Eurogas-Nexus-Client-0.5.0-x64-setup.exe**. It does not install a backend or database."
            echo "- Dedicated server or managed deployment: use **Eurogas-Nexus-Server-Windows.zip** and follow the operator guide."
            echo
            echo "Runtime data remains DB-first through the backend API. Clients do not connect directly to PostgreSQL."
          } > release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          PRERELEASE="${{ github.event.inputs.prerelease || 'true' }}"
          RELEASE_FLAGS=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            RELEASE_FLAGS+=(--prerelease)
          else
            RELEASE_FLAGS+=(--latest)
          fi
          gh release create "${{ steps.metadata.outputs.tag }}" \
            release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Eurogas Nexus ${{ steps.metadata.outputs.tag }}" \
            --notes-file release-notes.md \
            "${RELEASE_FLAGS[@]}"
