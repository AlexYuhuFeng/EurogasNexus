name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Update PR 7 route-cost integration expectation
        if: github.event_name == 'pull_request' && github.event.pull_request.number == 7 && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/integration/test_route_cost_db_api.py")
          text = path.read_text(encoding="utf-8")
          old = '''    assert payload["data"]["research_only"] is True
              assert payload["data"]["human_review_required"] is True'''.replace("              ", "    ")
          new = '''    assert payload["meta"]["research_only"] is True
              assert "research_only" not in payload["data"]
              assert payload["data"]["human_review_required"] is True'''.replace("              ", "    ")
          if old not in text:
              raise SystemExit("Expected legacy integration assertions were not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/integration/test_route_cost_db_api.py
          git commit -m "Update route-cost governance assertions"
          git push origin HEAD:refactor/terminology-cleanup

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q tests/api tests/contract tests/integration tests/ingestion tests/unit tests/sdk tests/cli tests/release tests/security

      - name: Import API
        run: python -c "from apps.api.main import app; print('app import ok'); print(len(app.routes))"

  web-client-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Web dependencies
        working-directory: clients/web
        run: npm ci

      - name: Build Web client
        working-directory: clients/web
        run: npm run build

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: eurogas-nexus-web
          path: clients/web/dist
          if-no-files-found: error

  desktop-client-build:
    name: Build desktop client (${{ matrix.artifact_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: nsis
            artifact_label: windows-x64
            artifact_glob: clients/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            bundle: deb
            artifact_label: linux-x64
            artifact_glob: clients/desktop/src-tauri/target/release/bundle/deb/*.deb
          - os: ubuntu-24.04-arm
            bundle: deb
            artifact_label: linux-arm64
            artifact_glob: clients/desktop/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/desktop/package-lock.json

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install Web dependencies
        working-directory: clients/web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: clients/desktop
        run: npm ci

      - name: Build desktop bundle
        working-directory: clients/desktop
        run: npm run build -- --bundles ${{ matrix.bundle }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: eurogas-nexus-${{ matrix.artifact_label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
