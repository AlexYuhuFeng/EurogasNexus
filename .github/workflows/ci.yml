name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Targeted tests
        run: pytest -q tests/api tests/contract tests/integration tests/sdk tests/cli tests/release tests/security

      - name: Import API
        run: python -c "from apps.api.main import app; print('app import ok'); print(len(app.routes))"

  web-client-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Web dependencies
        working-directory: clients/web
        run: npm ci

      - name: Build Web client
        working-directory: clients/web
        run: npm run build

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: eurogas-nexus-web
          path: clients/web/dist
          if-no-files-found: error
