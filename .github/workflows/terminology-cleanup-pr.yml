name: Terminology Cleanup PR

on:
  push:
    branches:
      - refactor/terminology-cleanup

permissions:
  contents: write

jobs:
  apply-cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: refactor/terminology-cleanup
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply cleanup
        run: python scripts/ops/apply_terminology_cleanup.py

      - name: Verify focused contract
        run: pytest -q tests/contract/test_repository_terminology_contract.py

      - name: Commit cleaned source
        run: |
          if git diff --quiet -- src/eurogas_nexus/api/routes/public/route_cost.py; then
            echo "No source cleanup change found."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/eurogas_nexus/api/routes/public/route_cost.py
          git commit -m "Remove legacy research-only response field"
          git push origin HEAD:refactor/terminology-cleanup
