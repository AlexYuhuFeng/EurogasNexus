name: App Builder Wiring

# Temporary automation to wire extracted App builders into App.tsx.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/app-builder-wiring.yml
      - scripts/ops/apply_app_builder_wiring.py
      - clients/web/src/App.tsx
      - clients/web/src/app/**
      - tests/contract/test_app_builder_wiring_script_contract.py
      - tests/contract/test_app_builder_barrel_contract.py
      - tests/contract/test_no_research_only_contract.py
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: app-builder-wiring-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wire-app:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'issues' || github.event.issue.title == 'Run App Builder Wiring')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wire App builders
        run: python scripts/ops/apply_app_builder_wiring.py

      - name: Verify no explicit research_only remains in App
        run: |
          if grep -R "research_only" clients/web/src/App.tsx; then
            echo "research_only still present in App.tsx"
            exit 1
          fi

      - name: Commit wired App
        run: |
          if git diff --quiet -- clients/web/src/App.tsx; then
            echo "No App.tsx changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clients/web/src/App.tsx
          git commit -m "Wire App to extracted builders"
          git push

      - name: Close trigger issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
