name: Manual CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest -q tests

      - name: Import API
        run: python -c "from apps.api.main import app; print('app import ok'); print(len(app.routes))"

  web-client-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install Web dependencies
        working-directory: clients/web
        run: npm ci

      - name: Build Web client
        working-directory: clients/web
        run: npm run build
