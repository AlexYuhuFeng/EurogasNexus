services:
  postgres:
    image: postgres:16-alpine
    container_name: eurogas-nexus-db
    environment:
      POSTGRES_DB: eurogas_nexus
      POSTGRES_USER: eurogas
      POSTGRES_PASSWORD: eurogas_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eurogas -d eurogas_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
