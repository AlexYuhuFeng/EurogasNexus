[alembic]
script_location = alembic
prepend_sys_path = .
# Runtime URL resolution is handled in alembic/env.py:
# RUNTIME_STORE_DATABASE_URL, then DATABASE_URL, then EUROGAS_NEXUS_DB_DSN.
sqlalchemy.url = postgresql+psycopg://placeholder:placeholder@localhost:5432/eurogas_nexus

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
